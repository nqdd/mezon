name: Desktop RS — Build & Test

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/desktop-rs/**'
      - '.github/workflows/desktop-rs.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'apps/desktop-rs/**'
      - '.github/workflows/desktop-rs.yml'

defaults:
  run:
    working-directory: apps/desktop-rs

jobs:
  build:
    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS arm64
            os: macos-latest # Apple Silicon runner
            target: aarch64-apple-darwin
          - label: macOS x64
            os: macos-13 # Intel runner
            target: x86_64-apple-darwin
          - label: Windows x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
          - label: Ubuntu x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # rust-toolchain.toml in apps/desktop-rs pins the channel (nightly).
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry & build artefacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop-rs -> target
          key: ${{ matrix.os }}-${{ matrix.target }}

      # ── Linux system deps ──────────────────────────────────────────────────
      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            libglib2.0-dev \
            libayatana-appindicator3-dev \
            libxdo-dev \
            libssl-dev \
            pkg-config

      # ── macOS: ensure Metal SDK is available ───────────────────────────────
      - name: Select Xcode (macOS)
        if: runner.os == 'macOS'
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      # ── Build ──────────────────────────────────────────────────────────────
      - name: Build (debug)
        run: cargo build --target ${{ matrix.target }}

      - name: Build (release)
        run: cargo build --release --target ${{ matrix.target }}

      # ── Tests ──────────────────────────────────────────────────────────────
      - name: Run tests
        run: cargo test --target ${{ matrix.target }}

      # ── Upload binaries ────────────────────────────────────────────────────
      - name: Upload binary (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: mezon-${{ matrix.target }}
          path: apps/desktop-rs/target/${{ matrix.target }}/release/mezon
          retention-days: 7

      - name: Upload binary (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: mezon-${{ matrix.target }}
          path: apps/desktop-rs/target/${{ matrix.target }}/release/mezon.exe
          retention-days: 7

      - name: Upload binary (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: mezon-${{ matrix.target }}
          path: apps/desktop-rs/target/${{ matrix.target }}/release/mezon
          retention-days: 7
