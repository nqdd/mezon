[package]
name = "gpui_macros"
version = "0.1.0"
edition = "2024"
publish = false
license = "Apache-2.0"
description = "Macros used by gpui"

[features]
inspector = []

[lib]
path = "src/gpui_macros.rs"
proc-macro = true
doctest = true

[dependencies]
heck.workspace = true
proc-macro2.workspace = true
quote.workspace = true
syn.workspace = true

[dev-dependencies]
gpui = { path = "../gpui", features = ["inspector"] }