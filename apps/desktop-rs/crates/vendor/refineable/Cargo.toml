[package]
name = "refineable"
version = "0.1.0"
edition = "2024"
publish = false
license = "Apache-2.0"
description = "A macro for creating 'refinement' types that can be used to partially initialize or mutate a complex struct"

[lib]
path = "src/refineable.rs"
doctest = false

[dependencies]
derive_refineable = { path = "../derive_refineable" }

[lints.rust]
warnings = "allow"

[lints.clippy]
all = "allow"
